<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GreenSoulIT | Digital Marketing Agency</title>

    <!-- Favicon (Browser tab logo) -->
    <link rel="icon" type="image/png" href="/components//image/favicon.ico" />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Plus Jakarta Sans for a modern agency look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --primary: #22c55e;
        --primary-dark: #16a34a;
        --primary-light: #f0fdf4;
      }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
        scroll-behavior: smooth;
        background-color: #ffffff;
        color: #1a1a1a;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .text-gradient {
        background: linear-gradient(135deg, #1a1a1a 0%, #4b5563 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .bg-soft-green {
        background: radial-gradient(circle at top right, #f0fdf4 0%, #ffffff 100%);
      }
      .custom-shadow {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05);
      }
      .hover-lift {
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .hover-lift:hover {
        transform: translateY(-8px);
      }

      .button-wrapper::before {
          animation: spin-gradient 4s linear infinite;
      }

      @keyframes spin-gradient {
          from {
              transform: rotate(0deg);
          }

          to {
              transform: rotate(360deg);
          }
      }
    </style>

    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
        "react/": "https://esm.sh/react@^19.2.4/",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
      }
    }
    </script>

    <link rel="stylesheet" href="/index.css">
  </head>

  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
